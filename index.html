<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMO TODO - 智能日程管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 粒子背景 -->
    <canvas id="particleCanvas"></canvas>

    <!-- 主布局 -->
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="20" r="18" stroke="var(--cyan)" stroke-width="1.5" opacity="0.6"/>
                        <circle cx="20" cy="20" r="12" stroke="var(--cyan)" stroke-width="1" opacity="0.4"/>
                        <circle cx="20" cy="20" r="4" fill="var(--cyan)"/>
                        <line x1="20" y1="2" x2="20" y2="8" stroke="var(--cyan)" stroke-width="1.5"/>
                        <line x1="20" y1="32" x2="20" y2="38" stroke="var(--cyan)" stroke-width="1.5"/>
                        <line x1="2" y1="20" x2="8" y2="20" stroke="var(--cyan)" stroke-width="1.5"/>
                        <line x1="32" y1="20" x2="38" y2="20" stroke="var(--cyan)" stroke-width="1.5"/>
                    </svg>
                </div>
                <span class="logo-text">MIMO <span class="accent">TODO</span></span>
            </div>

            <nav class="nav-menu">
                <a class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                    <span>仪表盘</span>
                </a>
                <a class="nav-item" data-page="create" onclick="switchPage('create')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="9"/>
                        <line x1="12" y1="8" x2="12" y2="16"/>
                        <line x1="8" y1="12" x2="16" y2="12"/>
                    </svg>
                    <span>新建日程</span>
                </a>
                <a class="nav-item" data-page="schedules" onclick="switchPage('schedules')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="4" width="18" height="16" rx="2"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                    </svg>
                    <span>查看日程</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span>系统在线</span>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <header class="top-bar">
                <div class="top-bar-left">
                    <h1 class="page-title" id="pageTitle">仪表盘</h1>
                    <span class="breadcrumb" id="breadcrumb">首页 / 仪表盘</span>
                </div>
                <div class="top-bar-right">
                    <div class="search-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="11" cy="11" r="7"/>
                            <line x1="16.5" y1="16.5" x2="21" y2="21"/>
                        </svg>
                        <input type="text" placeholder="搜索日程..." id="searchInput" oninput="filterSchedules()">
                    </div>
                    <div class="current-time" id="currentTime"></div>
                </div>
            </header>

            <!-- 页面内容 -->
            <div class="content-area">

                <!-- 仪表盘页面 -->
                <div class="page active" id="page-dashboard">
                    <!-- 统计卡片 -->
                    <div class="stats-grid">
                        <div class="stat-card breathing">
                            <div class="stat-icon cyan">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="3" y="4" width="18" height="16" rx="2"/>
                                    <line x1="3" y1="10" x2="21" y2="10"/>
                                </svg>
                            </div>
                            <div class="stat-info">
                                <span class="stat-value" id="totalSchedules">0</span>
                                <span class="stat-label">总日程数</span>
                            </div>
                        </div>
                        <div class="stat-card breathing" style="animation-delay: 0.5s">
                            <div class="stat-icon green">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <circle cx="12" cy="12" r="9"/>
                                    <polyline points="12,7 12,12 16,14"/>
                                </svg>
                            </div>
                            <div class="stat-info">
                                <span class="stat-value" id="todaySchedules">0</span>
                                <span class="stat-label">今日日程</span>
                            </div>
                        </div>
                        <div class="stat-card breathing" style="animation-delay: 1s">
                            <div class="stat-icon purple">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                                    <path d="M2 17l10 5 10-5"/>
                                    <path d="M2 12l10 5 10-5"/>
                                </svg>
                            </div>
                            <div class="stat-info">
                                <span class="stat-value" id="completedSchedules">0</span>
                                <span class="stat-label">已完成</span>
                            </div>
                        </div>
                        <div class="stat-card breathing" style="animation-delay: 1.5s">
                            <div class="stat-icon orange">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                                    <line x1="12" y1="9" x2="12" y2="13"/>
                                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                                </svg>
                            </div>
                            <div class="stat-info">
                                <span class="stat-value" id="pendingSchedules">0</span>
                                <span class="stat-label">待处理</span>
                            </div>
                        </div>
                    </div>

                    <!-- 今日日程预览 -->
                    <div class="dashboard-grid">
                        <div class="card">
                            <div class="card-header">
                                <h3>今日日程</h3>
                                <button class="btn-text" onclick="switchPage('schedules')">查看全部 →</button>
                            </div>
                            <div class="card-body" id="todayScheduleList">
                                <div class="empty-state">
                                    <svg viewBox="0 0 64 64" fill="none" stroke="var(--cyan)" stroke-width="1" opacity="0.4">
                                        <circle cx="32" cy="32" r="28"/>
                                        <line x1="32" y1="20" x2="32" y2="34"/>
                                        <circle cx="32" cy="40" r="2" fill="var(--cyan)"/>
                                    </svg>
                                    <p>今日暂无日程安排</p>
                                </div>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-header">
                                <h3>快速操作</h3>
                            </div>
                            <div class="card-body">
                                <div class="quick-actions">
                                    <button class="action-btn" onclick="switchPage('create')">
                                        <div class="action-icon">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                                <line x1="12" y1="5" x2="12" y2="19"/>
                                                <line x1="5" y1="12" x2="19" y2="12"/>
                                            </svg>
                                        </div>
                                        <span>手动新建</span>
                                    </button>
                                    <button class="action-btn" onclick="switchPage('create'); switchCreateTab('smart')">
                                        <div class="action-icon smart">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                                <path d="M12 2a7 7 0 0 1 7 7c0 2.5-1.5 4.5-3 6l-1 3H9l-1-3c-1.5-1.5-3-3.5-3-6a7 7 0 0 1 7-7z"/>
                                                <line x1="9" y1="21" x2="15" y2="21"/>
                                                <line x1="10" y1="24" x2="14" y2="24"/>
                                            </svg>
                                        </div>
                                        <span>智能创建</span>
                                    </button>
                                    <button class="action-btn" onclick="switchPage('schedules')">
                                        <div class="action-icon view">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                                <rect x="3" y="4" width="18" height="16" rx="2"/>
                                                <line x1="3" y1="10" x2="21" y2="10"/>
                                                <line x1="9" y1="14" x2="15" y2="14"/>
                                            </svg>
                                        </div>
                                        <span>查看日程</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 新建日程页面 -->
                <div class="page" id="page-create">
                    <div class="create-tabs">
                        <button class="tab-btn active" id="tabManual" onclick="switchCreateTab('manual')">手动输入</button>
                        <button class="tab-btn" id="tabSmart" onclick="switchCreateTab('smart')">智能输入</button>
                        <div class="tab-indicator" id="tabIndicator"></div>
                    </div>

                    <!-- 手动输入表单 -->
                    <div class="tab-content active" id="content-manual">
                        <div class="card form-card">
                            <div class="card-header">
                                <h3>新建日程</h3>
                            </div>
                            <div class="card-body">
                                <form id="manualForm" onsubmit="return handleManualSubmit(event)">
                                    <div class="form-group">
                                        <label class="form-label">日程标题</label>
                                        <input type="text" class="form-input" id="scheduleTitle" placeholder="输入日程标题" required>
                                    </div>
                                    <div class="form-row">
                                        <div class="form-group">
                                            <label class="form-label">开始时间</label>
                                            <input type="datetime-local" class="form-input" id="scheduleStart" required>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">结束时间</label>
                                            <input type="datetime-local" class="form-input" id="scheduleEnd" required>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">日程描述</label>
                                        <textarea class="form-input form-textarea" id="scheduleDesc" placeholder="输入日程描述（可选）" rows="3"></textarea>
                                    </div>
                                    <div class="form-row">
                                        <div class="form-group">
                                            <label class="form-label">优先级</label>
                                            <div class="priority-selector">
                                                <label class="priority-option">
                                                    <input type="radio" name="priority" value="low" checked>
                                                    <span class="priority-badge low">低</span>
                                                </label>
                                                <label class="priority-option">
                                                    <input type="radio" name="priority" value="medium">
                                                    <span class="priority-badge medium">中</span>
                                                </label>
                                                <label class="priority-option">
                                                    <input type="radio" name="priority" value="high">
                                                    <span class="priority-badge high">高</span>
                                                </label>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">紧急程度</label>
                                            <div class="priority-selector">
                                                <label class="priority-option">
                                                    <input type="radio" name="urgency" value="normal" checked>
                                                    <span class="urgency-badge normal">一般</span>
                                                </label>
                                                <label class="priority-option">
                                                    <input type="radio" name="urgency" value="urgent">
                                                    <span class="urgency-badge urgent">紧急</span>
                                                </label>
                                                <label class="priority-option">
                                                    <input type="radio" name="urgency" value="critical">
                                                    <span class="urgency-badge critical">非常紧急</span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="form-actions">
                                        <button type="submit" class="btn btn-primary">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <polyline points="20,6 9,17 4,12"/>
                                            </svg>
                                            创建日程
                                        </button>
                                        <button type="reset" class="btn btn-ghost">重置</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- 智能输入（占位） -->
                    <div class="tab-content" id="content-smart">
                        <div class="card form-card">
                            <div class="card-header">
                                <h3>智能日程创建</h3>
                                <span class="badge">即将推出</span>
                            </div>
                            <div class="card-body">
                                <div class="smart-placeholder">
                                    <div class="smart-icon breathing">
                                        <svg viewBox="0 0 64 64" fill="none" stroke="var(--purple)" stroke-width="1.5">
                                            <path d="M32 4c-5 0-9 4-9 9v2h-6a3 3 0 0 0-3 3v28a3 3 0 0 0 3 3h24a3 3 0 0 0 3-3V18a3 3 0 0 0-3-3h-6v-2c0-5-4-9-9-9z"/>
                                            <path d="M23 14v-3a9 9 0 0 1 18 0v3"/>
                                            <circle cx="32" cy="32" r="5"/>
                                            <path d="M32 27v-3"/>
                                            <path d="M32 38v3"/>
                                            <path d="M27 32h-3"/>
                                            <path d="M38 32h3"/>
                                        </svg>
                                    </div>
                                    <h3>AI 智能日程助手</h3>
                                    <p>通过自然语言描述，AI 将自动识别并创建日程安排</p>
                                    <div class="smart-features">
                                        <div class="feature-tag">自然语言理解</div>
                                        <div class="feature-tag">智能时间提取</div>
                                        <div class="feature-tag">冲突检测</div>
                                        <div class="feature-tag">优先级建议</div>
                                    </div>
                                    <div class="smart-input-mock">
                                        <div class="mock-input">
                                            <span class="mock-cursor"></span>
                                            <span class="mock-text">例如：明天下午2点到4点开项目会议...</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 查看日程页面 -->
                <div class="page" id="page-schedules">
                    <div class="schedules-header">
                        <div class="filter-bar">
                            <button class="filter-btn active" onclick="filterByStatus('all', this)">全部</button>
                            <button class="filter-btn" onclick="filterByStatus('pending', this)">待处理</button>
                            <button class="filter-btn" onclick="filterByStatus('completed', this)">已完成</button>
                        </div>
                        <button class="btn btn-primary btn-sm" onclick="switchPage('create')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            新建日程
                        </button>
                    </div>
                    <div class="schedules-list" id="schedulesList">
                        <div class="empty-state">
                            <svg viewBox="0 0 80 80" fill="none" stroke="var(--cyan)" stroke-width="1" opacity="0.3">
                                <circle cx="40" cy="40" r="36"/>
                                <rect x="24" y="24" width="32" height="32" rx="4"/>
                                <line x1="24" y1="34" x2="56" y2="34"/>
                                <line x1="32" y1="20" x2="32" y2="28"/>
                                <line x1="48" y1="20" x2="48" y2="28"/>
                            </svg>
                            <p>暂无日程安排</p>
                            <button class="btn btn-primary btn-sm" onclick="switchPage('create')">创建第一个日程</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 编辑日程模态框 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h3>编辑日程</h3>
                <button class="modal-close" onclick="closeEditModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="editForm" onsubmit="return handleEditSubmit(event)">
                    <input type="hidden" id="editId">
                    <div class="form-group">
                        <label class="form-label">日程标题</label>
                        <input type="text" class="form-input" id="editTitle" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">开始时间</label>
                            <input type="datetime-local" class="form-input" id="editStart" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">结束时间</label>
                            <input type="datetime-local" class="form-input" id="editEnd" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">日程描述</label>
                        <textarea class="form-input form-textarea" id="editDesc" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">优先级</label>
                        <div class="priority-selector">
                            <label class="priority-option">
                                <input type="radio" name="editPriority" value="low">
                                <span class="priority-badge low">低</span>
                            </label>
                            <label class="priority-option">
                                <input type="radio" name="editPriority" value="medium">
                                <span class="priority-badge medium">中</span>
                            </label>
                            <label class="priority-option">
                                <input type="radio" name="editPriority" value="high">
                                <span class="priority-badge high">高</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">紧急程度</label>
                        <div class="priority-selector">
                            <label class="priority-option">
                                <input type="radio" name="editUrgency" value="normal">
                                <span class="urgency-badge normal">一般</span>
                            </label>
                            <label class="priority-option">
                                <input type="radio" name="editUrgency" value="urgent">
                                <span class="urgency-badge urgent">紧急</span>
                            </label>
                            <label class="priority-option">
                                <input type="radio" name="editUrgency" value="critical">
                                <span class="urgency-badge critical">非常紧急</span>
                            </label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeEditModal()">取消</button>
                <button class="btn btn-primary" onclick="handleEditSubmit(event)">保存修改</button>
            </div>
        </div>
    </div>

    <!-- 通知提示 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="app.js"></script>
</body>
</html>
