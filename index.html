<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMO TODO - 智能日程管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 粒子背景 -->
    <canvas id="particleCanvas"></canvas>

    <!-- 六边形网格背景 -->
    <div class="hex-bg">
        <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
            <defs>
                <pattern id="hexPattern" x="0" y="0" width="56" height="100" patternUnits="userSpaceOnUse" patternTransform="scale(1.5)">
                    <path d="M28 0 L56 16.5 L56 49.5 L28 66 L0 49.5 L0 16.5 Z" fill="none" stroke="rgba(255,140,50,0.04)" stroke-width="0.8"/>
                    <path d="M28 33 L56 49.5 L56 82.5 L28 99 L0 82.5 L0 49.5 Z" fill="none" stroke="rgba(139,92,246,0.03)" stroke-width="0.8"/>
                </pattern>
                <radialGradient id="hexGlow1" cx="20%" cy="25%" r="40%">
                    <stop offset="0%" stop-color="rgba(255,140,50,0.06)"/>
                    <stop offset="100%" stop-color="transparent"/>
                </radialGradient>
                <radialGradient id="hexGlow2" cx="80%" cy="70%" r="35%">
                    <stop offset="0%" stop-color="rgba(139,92,246,0.04)"/>
                    <stop offset="100%" stop-color="transparent"/>
                </radialGradient>
            </defs>
            <rect width="100%" height="100%" fill="url(#hexPattern)"/>
            <rect width="100%" height="100%" fill="url(#hexGlow1)"/>
            <rect width="100%" height="100%" fill="url(#hexGlow2)"/>
        </svg>
    </div>

    <!-- 主布局 -->
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="20" r="18" stroke="var(--orange)" stroke-width="1.5" opacity="0.6"/>
                        <circle cx="20" cy="20" r="12" stroke="var(--purple)" stroke-width="1" opacity="0.4"/>
                        <circle cx="20" cy="20" r="4" fill="var(--orange)"/>
                        <line x1="20" y1="2" x2="20" y2="8" stroke="var(--orange)" stroke-width="1.5"/>
                        <line x1="20" y1="32" x2="20" y2="38" stroke="var(--orange)" stroke-width="1.5"/>
                        <line x1="2" y1="20" x2="8" y2="20" stroke="var(--purple)" stroke-width="1.5"/>
                        <line x1="32" y1="20" x2="38" y2="20" stroke="var(--purple)" stroke-width="1.5"/>
                    </svg>
                </div>
                <span class="logo-text">MIMO <span class="accent">TODO</span></span>
            </div>

            <nav class="nav-menu">
                <a class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                    <span>仪表盘</span>
                </a>
                <a class="nav-item" data-page="create" onclick="switchPage('create')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="9"/>
                        <line x1="12" y1="8" x2="12" y2="16"/>
                        <line x1="8" y1="12" x2="16" y2="12"/>
                    </svg>
                    <span>新建日程</span>
                </a>
                <a class="nav-item" data-page="schedules" onclick="switchPage('schedules')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="4" width="18" height="16" rx="2"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                    </svg>
                    <span>查看日程</span>
                </a>
            </nav>

            <!-- 音乐播放器 -->
            <div class="music-player" id="musicPlayer">
                <div class="music-info">
                    <div class="music-cover">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M9 18V5l12-2v13"/>
                            <circle cx="6" cy="18" r="3"/>
                            <circle cx="18" cy="16" r="3"/>
                        </svg>
                    </div>
                    <div class="music-text">
                        <div class="music-title" id="musicTitle">点击播放轻音乐</div>
                        <div class="music-artist" id="musicArtist">MIMO 音乐</div>
                    </div>
                </div>
                <div class="music-progress">
                    <div class="music-progress-bar" id="musicProgressBar">
                        <div class="music-progress-fill" id="musicProgressFill"></div>
                    </div>
                    <div class="music-time">
                        <span id="musicTimeCurrent">0:00</span>
                        <span id="musicTimeTotal">0:00</span>
                    </div>
                </div>
                <div class="music-controls">
                    <button class="music-ctrl-btn" id="musicModeBtn" onclick="toggleMusicMode()" title="播放模式">
                        <svg class="mode-loop" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="17,1 21,5 17,9"/>
                            <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                            <polyline points="7,23 3,19 7,15"/>
                            <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                        </svg>
                        <svg class="mode-single" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                            <polyline points="17,1 21,5 17,9"/>
                            <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                            <polyline points="7,23 3,19 7,15"/>
                            <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                            <text x="12" y="14" text-anchor="middle" fill="currentColor" stroke="none" font-size="7" font-weight="bold">1</text>
                        </svg>
                        <svg class="mode-shuffle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                            <polyline points="16,3 21,3 21,8"/>
                            <line x1="4" y1="20" x2="21" y2="3"/>
                            <polyline points="21,16 21,21 16,21"/>
                            <line x1="15" y1="15" x2="21" y2="21"/>
                            <line x1="4" y1="4" x2="9" y2="9"/>
                        </svg>
                    </button>
                    <button class="music-ctrl-btn" onclick="musicPrev()" title="上一首">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                    </button>
                    <button class="music-ctrl-btn music-play-btn" id="musicPlayBtn" onclick="toggleMusic()" title="播放/暂停">
                        <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
                    </button>
                    <button class="music-ctrl-btn" onclick="musicNext()" title="下一首">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    </button>
                    <button class="music-ctrl-btn music-volume-btn" onclick="toggleMusicMute()" title="音量">
                        <svg class="vol-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor"/>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
                        </svg>
                        <svg class="vol-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                            <polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor"/>
                            <line x1="23" y1="9" x2="17" y2="15"/>
                            <line x1="17" y1="9" x2="23" y2="15"/>
                        </svg>
                    </button>
                </div>
                <div class="music-volume-slider" id="musicVolumeSlider">
                    <input type="range" min="0" max="100" value="60" id="musicVolumeRange" oninput="setMusicVolume(this.value)">
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span>系统在线</span>
                </div>
            </div>
        </aside>

        <!-- 移动端遮罩 -->
        <div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileMenu()"></div>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <header class="top-bar">
                <div class="top-bar-left">
                    <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileMenu()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="6" x2="21" y2="6"/>
                            <line x1="3" y1="12" x2="21" y2="12"/>
                            <line x1="3" y1="18" x2="21" y2="18"/>
                        </svg>
                    </button>
                    <h1 class="page-title" id="pageTitle">仪表盘</h1>
                    <span class="breadcrumb" id="breadcrumb">首页 / 仪表盘</span>
                </div>
                <div class="top-bar-right">
                    <div class="search-wrapper">
                        <div class="search-box">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="11" cy="11" r="7"/>
                                <line x1="16.5" y1="16.5" x2="21" y2="21"/>
                            </svg>
                            <input type="text" placeholder="搜索日程..." id="searchInput" oninput="handleSearchInput()" autocomplete="off">
                        </div>
                        <div class="search-dropdown" id="searchDropdown"></div>
                    </div>
                    <div class="current-time" id="currentTime"></div>
                </div>
            </header>

            <!-- 页面内容 -->
            <div class="content-area">

                <!-- 仪表盘页面 -->
                <div class="page active" id="page-dashboard">
                    <!-- 统计卡片 -->
                    <div class="stats-grid">
                        <div class="stat-card breathing">
                            <div class="stat-icon cyan">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="3" y="4" width="18" height="16" rx="2"/>
                                    <line x1="3" y1="10" x2="21" y2="10"/>
                                </svg>
                            </div>
                            <div class="stat-info">
                                <span class="stat-value" id="totalSchedules">0</span>
                                <span class="stat-label">总日程数</span>
                            </div>
                        </div>
                        <div class="stat-card breathing" style="animation-delay: 0.5s">
                            <div class="stat-icon green">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <circle cx="12" cy="12" r="9"/>
                                    <polyline points="12,7 12,12 16,14"/>
                                </svg>
                            </div>
                            <div class="stat-info">
                                <span class="stat-value" id="todaySchedules">0</span>
                                <span class="stat-label">今日日程</span>
                            </div>
                        </div>
                        <div class="stat-card breathing" style="animation-delay: 1s">
                            <div class="stat-icon purple">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                                    <path d="M2 17l10 5 10-5"/>
                                    <path d="M2 12l10 5 10-5"/>
                                </svg>
                            </div>
                            <div class="stat-info">
                                <span class="stat-value" id="completedSchedules">0</span>
                                <span class="stat-label">已完成</span>
                            </div>
                        </div>
                        <div class="stat-card breathing" style="animation-delay: 1.5s">
                            <div class="stat-icon orange">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                                    <line x1="12" y1="9" x2="12" y2="13"/>
                                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                                </svg>
                            </div>
                            <div class="stat-info">
                                <span class="stat-value" id="pendingSchedules">0</span>
                                <span class="stat-label">待处理</span>
                            </div>
                        </div>
                    </div>

                    <!-- 今日日程预览 -->
                    <div class="dashboard-grid">
                        <div class="card">
                            <div class="card-header">
                                <h3>今日日程</h3>
                                <button class="btn-text" onclick="switchPage('schedules')">查看全部 →</button>
                            </div>
                            <div class="card-body" id="todayScheduleList">
                                <div class="empty-state">
                                    <svg viewBox="0 0 64 64" fill="none" stroke="var(--orange)" stroke-width="1" opacity="0.4">
                                        <circle cx="32" cy="32" r="28"/>
                                        <line x1="32" y1="20" x2="32" y2="34"/>
                                        <circle cx="32" cy="40" r="2" fill="var(--orange)"/>
                                    </svg>
                                    <p>今日暂无日程安排</p>
                                </div>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-header">
                                <h3>快速操作</h3>
                            </div>
                            <div class="card-body">
                                <div class="quick-actions">
                                    <button class="action-btn" onclick="switchPage('create')">
                                        <div class="action-icon">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                                <line x1="12" y1="5" x2="12" y2="19"/>
                                                <line x1="5" y1="12" x2="19" y2="12"/>
                                            </svg>
                                        </div>
                                        <span>手动新建</span>
                                    </button>
                                    <button class="action-btn" onclick="switchPage('create'); switchCreateTab('smart')">
                                        <div class="action-icon smart">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                                <path d="M12 2a7 7 0 0 1 7 7c0 2.5-1.5 4.5-3 6l-1 3H9l-1-3c-1.5-1.5-3-3.5-3-6a7 7 0 0 1 7-7z"/>
                                                <line x1="9" y1="21" x2="15" y2="21"/>
                                                <line x1="10" y1="24" x2="14" y2="24"/>
                                            </svg>
                                        </div>
                                        <span>智能创建</span>
                                    </button>
                                    <button class="action-btn" onclick="switchPage('schedules')">
                                        <div class="action-icon view">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                                <rect x="3" y="4" width="18" height="16" rx="2"/>
                                                <line x1="3" y1="10" x2="21" y2="10"/>
                                                <line x1="9" y1="14" x2="15" y2="14"/>
                                            </svg>
                                        </div>
                                        <span>查看日程</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 新建日程页面 -->
                <div class="page" id="page-create">
                    <div class="create-tabs">
                        <button class="tab-btn active" id="tabManual" onclick="switchCreateTab('manual')">手动输入</button>
                        <button class="tab-btn" id="tabSmart" onclick="switchCreateTab('smart')">智能输入</button>
                        <div class="tab-indicator" id="tabIndicator"></div>
                    </div>

                    <!-- 手动输入表单 -->
                    <div class="tab-content active" id="content-manual">
                        <div class="card form-card">
                            <div class="card-header">
                                <h3>新建日程</h3>
                            </div>
                            <div class="card-body">
                                <form id="manualForm" onsubmit="return handleManualSubmit(event)">
                                    <div class="form-group">
                                        <label class="form-label">日程标题</label>
                                        <input type="text" class="form-input" id="scheduleTitle" placeholder="输入日程标题" required>
                                    </div>
                                    <div class="form-row">
                                        <div class="form-group">
                                            <label class="form-label">开始时间</label>
                                            <input type="datetime-local" class="form-input" id="scheduleStart" required>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">结束时间</label>
                                            <input type="datetime-local" class="form-input" id="scheduleEnd" required>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">日程描述</label>
                                        <textarea class="form-input form-textarea" id="scheduleDesc" placeholder="输入日程描述（可选）" rows="3"></textarea>
                                    </div>
                                    <div class="form-row">
                                        <div class="form-group">
                                            <label class="form-label">优先级</label>
                                            <div class="priority-selector">
                                                <label class="priority-option">
                                                    <input type="radio" name="priority" value="low" checked>
                                                    <span class="priority-badge low">低</span>
                                                </label>
                                                <label class="priority-option">
                                                    <input type="radio" name="priority" value="medium">
                                                    <span class="priority-badge medium">中</span>
                                                </label>
                                                <label class="priority-option">
                                                    <input type="radio" name="priority" value="high">
                                                    <span class="priority-badge high">高</span>
                                                </label>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">紧急程度</label>
                                            <div class="priority-selector">
                                                <label class="priority-option">
                                                    <input type="radio" name="urgency" value="normal" checked>
                                                    <span class="urgency-badge normal">一般</span>
                                                </label>
                                                <label class="priority-option">
                                                    <input type="radio" name="urgency" value="urgent">
                                                    <span class="urgency-badge urgent">紧急</span>
                                                </label>
                                                <label class="priority-option">
                                                    <input type="radio" name="urgency" value="critical">
                                                    <span class="urgency-badge critical">非常紧急</span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="form-actions">
                                        <button type="submit" class="btn btn-primary">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <polyline points="20,6 9,17 4,12"/>
                                            </svg>
                                            创建日程
                                        </button>
                                        <button type="reset" class="btn btn-ghost">重置</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- 智能输入 -->
                    <div class="tab-content" id="content-smart">
                        <div class="card ai-chat-card">
                            <div class="card-header">
                                <h3>AI 智能日程助手</h3>
                                <div class="ai-header-actions">
                                    <button class="btn-text" onclick="clearAiChat()">清空对话</button>
                                </div>
                            </div>
                            <div class="ai-chat-body" id="aiChatBody">
                                <div class="ai-welcome">
                                    <div class="ai-avatar ai-avatar-bot">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                            <path d="M12 2a7 7 0 0 1 7 7c0 2.5-1.5 4.5-3 6l-1 3H9l-1-3c-1.5-1.5-3-3.5-3-6a7 7 0 0 1 7-7z"/>
                                            <line x1="9" y1="21" x2="15" y2="21"/>
                                        </svg>
                                    </div>
                                    <div class="ai-welcome-text">
                                        <p>你好！我是 AI 日程助手，告诉我你想要安排什么，我会帮你智能创建日程。</p>
                                        <div class="ai-examples">
                                            <button class="ai-example-btn" onclick="sendAiExample(this)">明天下午2点到4点开项目会议，高优先级</button>
                                            <button class="ai-example-btn" onclick="sendAiExample(this)">帮我安排下周的复习计划，周一到周五每天晚上8点到10点</button>
                                            <button class="ai-example-btn" onclick="sendAiExample(this)">后天上午面试，非常紧急</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="ai-chat-footer">
                                <div class="ai-input-wrapper">
                                    <input type="text" class="form-input ai-input" id="aiInput" placeholder="描述你想创建的日程..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAiMessage()}">
                                    <button class="ai-voice-btn" id="aiVoiceBtn" onclick="toggleVoiceInput()" title="语音输入">
                                        <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <rect x="9" y="1" width="6" height="12" rx="3"/>
                                            <path d="M5 10a7 7 0 0 0 14 0"/>
                                            <line x1="12" y1="17" x2="12" y2="21"/>
                                            <line x1="8" y1="21" x2="16" y2="21"/>
                                        </svg>
                                        <svg class="stop-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                                            <rect x="6" y="6" width="12" height="12" rx="2"/>
                                        </svg>
                                    </button>
                                    <button class="ai-send-btn" id="aiSendBtn" onclick="sendAiMessage()">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <line x1="22" y1="2" x2="11" y2="13"/>
                                            <polygon points="22,2 15,22 11,13 2,9"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 查看日程页面 -->
                <div class="page" id="page-schedules">
                    <div class="schedules-header">
                        <div class="filter-bar">
                            <button class="filter-btn active" onclick="filterByStatus('all', this)">全部</button>
                            <button class="filter-btn" onclick="filterByStatus('pending', this)">待处理</button>
                            <button class="filter-btn" onclick="filterByStatus('completed', this)">已完成</button>
                        </div>
                        <button class="btn btn-primary btn-sm" onclick="switchPage('create')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            新建日程
                        </button>
                    </div>
                    <div class="schedules-list" id="schedulesList">
                        <div class="empty-state">
                            <svg viewBox="0 0 80 80" fill="none" stroke="var(--orange)" stroke-width="1" opacity="0.3">
                                <circle cx="40" cy="40" r="36"/>
                                <rect x="24" y="24" width="32" height="32" rx="4"/>
                                <line x1="24" y1="34" x2="56" y2="34"/>
                                <line x1="32" y1="20" x2="32" y2="28"/>
                                <line x1="48" y1="20" x2="48" y2="28"/>
                            </svg>
                            <p>暂无日程安排</p>
                            <button class="btn btn-primary btn-sm" onclick="switchPage('create')">创建第一个日程</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 编辑日程模态框 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h3>编辑日程</h3>
                <button class="modal-close" onclick="closeEditModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="editForm" onsubmit="return handleEditSubmit(event)">
                    <input type="hidden" id="editId">
                    <div class="form-group">
                        <label class="form-label">日程标题</label>
                        <input type="text" class="form-input" id="editTitle" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">开始时间</label>
                            <input type="datetime-local" class="form-input" id="editStart" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">结束时间</label>
                            <input type="datetime-local" class="form-input" id="editEnd" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">日程描述</label>
                        <textarea class="form-input form-textarea" id="editDesc" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">优先级</label>
                        <div class="priority-selector">
                            <label class="priority-option">
                                <input type="radio" name="editPriority" value="low">
                                <span class="priority-badge low">低</span>
                            </label>
                            <label class="priority-option">
                                <input type="radio" name="editPriority" value="medium">
                                <span class="priority-badge medium">中</span>
                            </label>
                            <label class="priority-option">
                                <input type="radio" name="editPriority" value="high">
                                <span class="priority-badge high">高</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">紧急程度</label>
                        <div class="priority-selector">
                            <label class="priority-option">
                                <input type="radio" name="editUrgency" value="normal">
                                <span class="urgency-badge normal">一般</span>
                            </label>
                            <label class="priority-option">
                                <input type="radio" name="editUrgency" value="urgent">
                                <span class="urgency-badge urgent">紧急</span>
                            </label>
                            <label class="priority-option">
                                <input type="radio" name="editUrgency" value="critical">
                                <span class="urgency-badge critical">非常紧急</span>
                            </label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeEditModal()">取消</button>
                <button class="btn btn-primary" onclick="handleEditSubmit(event)">保存修改</button>
            </div>
        </div>
    </div>

    <!-- 日程详情模态框 -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal detail-modal">
            <div class="modal-header">
                <h3 id="detailTitle">日程详情</h3>
                <button class="modal-close" onclick="closeDetailModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="detail-section">
                    <div class="detail-row">
                        <span class="detail-label">状态</span>
                        <span class="detail-value" id="detailStatus"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">时间</span>
                        <span class="detail-value detail-time" id="detailTime"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">优先级</span>
                        <span class="detail-value" id="detailPriority"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">紧急程度</span>
                        <span class="detail-value" id="detailUrgency"></span>
                    </div>
                    <div class="detail-row" id="detailCompletedRow" style="display:none">
                        <span class="detail-label">完成时间</span>
                        <span class="detail-value" id="detailCompletedAt"></span>
                    </div>
                </div>
                <div class="detail-section">
                    <div class="detail-label-full">描述</div>
                    <div class="detail-desc" id="detailDesc">暂无描述</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label-full">成果记录</div>
                    <div class="achievements-list" id="achievementsList"></div>
                    <div class="achievement-add">
                        <div class="achievement-add-text">
                            <input type="text" class="form-input" id="achievementTextInput" placeholder="添加文字成果...">
                            <button class="btn btn-primary btn-sm" onclick="addTextAchievement()">添加</button>
                        </div>
                        <div class="achievement-add-file">
                            <label class="file-upload-label">
                                <input type="file" id="achievementFileInput" accept="image/*,video/*" onchange="uploadFileAchievement()" style="display:none">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="17,8 12,3 7,8"/>
                                    <line x1="12" y1="3" x2="12" y2="15"/>
                                </svg>
                                上传图片/视频
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeDetailModal()">关闭</button>
                <button class="btn btn-primary" id="detailEditBtn" onclick="editFromDetail()">编辑</button>
            </div>
        </div>
    </div>

    <!-- 通知提示 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 日程提醒弹窗容器 -->
    <div class="notification-container" id="notificationContainer"></div>

    <script src="app.js"></script>
</body>
</html>
